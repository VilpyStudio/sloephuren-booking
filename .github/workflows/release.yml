name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building sloephuren-booking ${VERSION}"
          mkdir -p build/sloephuren-booking
          rsync -a --exclude '.git' \
                   --exclude '.github' \
                   --exclude 'build' \
                   --exclude '*.zip' \
                   ./ build/sloephuren-booking/
          cd build
          zip -r ../sloephuren-booking.zip sloephuren-booking
          cd ..
          unzip -l sloephuren-booking.zip

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" sloephuren-booking.zip --clobber
          else
            gh release create "$TAG" sloephuren-booking.zip \
              --title "$TAG" \
              --generate-notes
          fi
